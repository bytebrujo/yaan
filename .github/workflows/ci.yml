name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pin to the framework's minimum Zig. Bump alongside minimum_zig_version
      # in build.zig.zon. (If this action ref drifts, update it.)
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Framework build + tests
        run: |
          zig build
          zig build test

      - name: Example app (the reference consumer) build/test/check
        working-directory: examples/app
        run: |
          zig build
          zig build test
          zig build check

      - name: Deploy artifact cross-compiles to a static musl binary
        working-directory: examples/app
        run: zig build -Doptimize=ReleaseFast -Dtarget=x86_64-linux-musl
